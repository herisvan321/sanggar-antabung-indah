<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RustBasic - Framework web full-stack modern berkinerja tinggi berbasis Rust (Custom HTTP Engine) dan React.js">
    <meta name="keywords" content="rust, rustbasic, web framework, react, inertia, spa, web development">
    <meta name="author" content="RustBasic">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>RustBasic - React + Inertia SPA</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Assets dari Vite (Tailwind v4 is compiled here) -->
    {{ vite_assets | safe }}
    
    <script>
        // Setup initial theme dynamically before rendering fully to prevent flash
        (function() {
            const path = window.location.pathname;
            const isAdminRoute = path.startsWith('/dashboard');
            const otherRoutes = ['/', '/profil', '/filosofi', '/galeri', '/jadwal', '/program', '/join', '/berita', '/booking', '/kontak', '/sop'];
            const isOtherRoute = otherRoutes.includes(path) || isAdminRoute;
            
            let theme = 'light';
            if (isOtherRoute) {
                theme = localStorage.getItem('other_theme') || 'light';
            } else {
                theme = localStorage.getItem('theme') || 'dark';
            }
            
            document.documentElement.classList.add(theme);
        })();
    </script>
    
    <style>
        /* Smooth transitions & default spacing */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }

        html.dark, html.dark body {
            background-color: #0a0a0c !important;
            color: #ffffff !important;
        }

        html.light, html.light body {
            background-color: #f8fafc !important;
            color: #0f172a !important;
        }
        
        /* Hide scrollbars during transitions */
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <!-- App Container Inertia -->
    <div id="app" data-page='{{ page | tojson | safe }}'></div>
</body>
</html>
